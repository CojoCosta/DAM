<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <meta name="keywords" content="ejercicio, formulario,datos">
</head>

<body>
    <form action="#" method="post">
        <fieldset style="width: 80%;">
            <legend>
                <h1>Modas Paquita</h1>
            </legend>
            <h2>Paso1. Datos personales</h2>
            <div style="display: flex; height: 150px; width: 100%;">
                <div style="width: 70%; height: 120px; display: flex;">
                    <fieldset style="width: 100%;">
                        <legend>Datos del cliente</legend>
                        <table>
                            <tr>
                                <td>
                                    <label for="correo">Correo electrónico: </label>
                                    <input type="email" name="correo" id="correo">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <label for="contra">Contraseña: </label>
                                    <input type="password" name="contra" id="contra">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <span>(Longitud mínima 6 caracteres)</span>
                                </td>
                            </tr>
                        </table>
                    </fieldset>
                </div>
                <div style="width: 30%; height: 120px; justify-content: right; display: flex;">
                    <fieldset style="width: 100%;">
                        <table>
                            <legend>Tipo de cliente</legend>
                            <tr>
                                <td>
                                    <label for="tipocliente"></label>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <input type="radio" name="tipocliente" id="particular"><span>Particular</span>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <input type="radio" name="tipocliente" id="asociacion"><span>Asociación</span>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <input type="radio" name="tipocliente" id="empresa"><span>Empresa</span>
                                </td>
                            </tr>
                        </table>
                    </fieldset>
                </div>
            </div>
            <h2>Paso2. Pedido</h2>
            <div style="display: flex;">
                <div style="height: 200px; width: 50%; display: flex; justify-content: left;">
                    <fieldset style="height: 190px; width: 100%;">
                        <legend>Datos del producto</legend>
                        <table>
                            <p>Producto</p>
                            <tr>
                                <select name="ropa" id="ropa">
                                    <optgroup label="Camisas">
                                        <option value="Camisas" selected>Manga larga</option>
                                        <option value="Camisas">Manga corta</option>
                                    </optgroup>
                                    <optgroup label="Pantalones">
                                        <option value="Pantalones">Pantalón pitillo</option>
                                        <option value="Pantalones">Pantalón campana</option>
                                        <option value="Pantalones">Pantalón corto</option>
                                    </optgroup>
                                </select>
                            </tr>
                        </table>
                    </fieldset>
                </div>
                <div style="height: 200px; width: 50%; display: flex; justify-content: right;">
                    <fieldset style="width: 100%;">
                        <legend>Información de interés</legend>
                        <table>
                            <tr>
                                <td>
                                    <label for="Comentarios">Comentarios</label>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <textarea name="Comentarios" id="comentarios"
                                        placeholder="Escriba aquí sus comentarios..." cols="40" rows="4"
                                        style="resize: none; overscroll-behavior: 5"></textarea>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <input type="checkbox" name="aceptar" id="aceptar" checked>
                                    <span>Acepto recibir información publicitaria</span>
                                </td>
                            </tr>
                        </table>
                    </fieldset>
                </div>
            </div>
            <br>
            <div style="display: flex;">
                <div style="width: 50%; height: 200px;">
                    <fieldset>
                        <legend>Datos de envío</legend>
                        <table>
                            <tr>
                                <td>
                                    <label for="Direccion">Dirección: </label>
                                    <input type="usuario" name="Direccion" id="direccion">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <label for="Ciudad">Ciudad:</label>
                                    <input type="text" name="Ciudad" id="ciudad">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <label for="cp">Código Postal: </label>
                                    <input type="text" name="cp" id="cp">
                                </td>
                            </tr>
                        </table>
                    </fieldset>
                </div>
                <div style="width: 50%; height: 200px;">
                    <fieldset>
                        <legend>Datos Bancarios</legend>
                        <table>
                            <tr>
                                <td>
                                    <label for="nombreEntidad">Nombre de la entidad: </label>
                                    <input type="text" name="nombreEntidad" id="nombreEntidad">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <label for="nCuenta">Nº de cuenta: </label>
                                    <input type="number" name="nCuenta" id="nCuenta">
                                </td>
                            </tr>
                        </table>
                    </fieldset>
                </div>
            </div>
            <div style="display: flex;">
                <div style="width: 50%;">
                    <input type="submit" value="Enviar pedido">
                </div>
                <div style="width: 50%;">
                    <input type="reset" value="Borrar formulario">
                </div>
            </div>
        </fieldset>
    </form>
</body>

</html>
